name: hermes-persist-kanban-workspace
version: "1.1.0"
description: >
  Overrides the built-in ``kanban_create`` tool to default to a
  persistent ``dir:`` workspace instead of ``scratch`` (which deletes
  output on completion). Explicit ``workspace_kind='scratch'`` is
  still honoured for throwaway tasks. Schema derived from the core
  tool at registration time to prevent drift.
author: qsh
homepage: https://github.com/vforge-labs/hermes-persist-kanban-workspace
license: Apache-2.0
tags:
  - kanban
  - workspace
  - persistence
  - hermes-plugin
  - task-management
